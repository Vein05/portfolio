[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

[[redirects]]
  from = "/pages/academic-qualifications"
  to = "/"
  status = 301

# SPA fallback is NOT needed — Astro generates static HTML for every route

[[redirects]]
  from = "/posts/images/.optimized/*"
  to = "/posts/images/optimized/:splat"
  status = 200

[[redirects]]
  from = "/images/.optimized/*"
  to = "/images/optimized/:splat"
  status = 200